	<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<title>5.2: Arithmetic Operators</title>
</head>

<body>
	<h3>
		<script type ="text/javascript">
			var num1 = 4;
			var num2 = 6;
			var sum = num1 + num2
			document.write("num1 + num2 = " + sum + "<br>");
			var x = 2;
			var y = 7;
			var potato = x - y + 42
			document.write("x - y + 42 = " + potato + "<br>");
			var a = 6;
			var b = 9;
			var ab = a * b
			document.write("a * b = " + ab + "<br");
			var c = 16;
			var d = 8;
			var cd = c / d
			document.write("c / d = " + cd + "<br>")
		</script>
	</h3>
</body>
</html>
