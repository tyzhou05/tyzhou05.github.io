<body>
<script type="text/javascript">
	var f = prompt("Give me a Fahrenheit Temperature!");
	
	// convert fahrenheit to celsius here
	var c = (f - 32) / 1.8;
	document.write(f + " degrees Fahrenheit is " + c + ' degrees Celsius.');
</script>
<!-- Display an image of a weather map -->
	<img src = "../images/weather.jpg" alt = "">
