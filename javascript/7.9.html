<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<title>7.9</title>
</head>

<body>
	<script type="text/javascript">
		while (true) {
			var f = prompt("Give me a Fahrenheit Temperature!");
			var c = (f - 32) / 1.8;
			var _continue = confirm("Your Fahrenheit temperature is " + c + " degrees Celsius. Do you want to enter another number?");
			if (_continue == false) {
				break;
			}
		} 
	</script>
</body>
</html>
