<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<title>7.10</title>
</head>

<body>
	<table border = "1">
		<th>Fahrenheit</th>
		<th>Celsius</th>
	<script type="text/javascript">
		for(var rows = 20; rows <= 100; rows++) {
			var c = (rows - 32) / 1.8;
			document.write("<tr>");
			document.write("<td>" + rows + "</td><td>" + c + "</td>");
			document.write("</tr>");
		}
	</script>
	</table>
</body>
</html>
